name = "motherbrain-a2a-endpoint"
main = "src/index.ts"
compatibility_date = "2026-05-01"

[vars]
ENVIRONMENT = "production"
AI_MODEL = "default"

# NOTE: GATEWAY_BASE_URL, ENCORE_API_URL, and ENCORE_API_KEY are NOT hardcoded
# here — they are deployed as Cloudflare Worker secrets via the MB app
# Deploy action (mapped in config.json → actions.deploy.secrets).
#
# This keeps secrets out of the public repo. Set them in:
#   MB app → Settings → Agent Identity (Gateway URL + Token)
#   MB app → Settings → License Key Integration (Encore API URL + Key)
#   MB app → Settings → Session Token Verification (JWT Secret)
# Then click Deploy to push them to the Worker.

# Secrets to set via `wrangler secret put`:
# - SUPABASE_URL
# - SUPABASE_SERVICE_KEY
# - MOTHER_BRAIN_GATEWAY_TOKEN
# - MOTHER_BRAIN_USER_TOKEN   (Sub-Agent access token — Zero Trust attribution)
# - VOYAGE_API_KEY
#
# ── Offline Fallback (Project Knowledge Base) ──
# Optional. When set, enables direct Supabase fallback when the MCP Gateway
# is unreachable. Points at the Mother Brain PROJECT's Supabase (different
# from SUPABASE_URL above, which is the A2A Agent's own chat-history DB).
# If unset, the Worker falls back to the existing placeholder response.
# - MB_SUPABASE_URL         (e.g. https://your-project-ref.supabase.co)
# - MB_SUPABASE_SERVICE_KEY (service_role key for the project Supabase)
# - MB_PROJECT_ID           (table prefix, e.g. your_project_id)
#
# ── Website MCP Server (motherbrain.app) ──
# Optional. When set, exposes website.* tools (read_page, navigate,
# get_account, etc.) to the A2A agent. When unset, the agent silently
# operates without website tools (graceful degradation — no behavior change).
# - MCP_BASE_URL  (e.g. https://api.motherbrain.app)
# - MCP_API_KEY   (mb_mcp_<hex> — distinct from MOTHER_BRAIN_GATEWAY_TOKEN)
# - WEBSITE_URL   (e.g. https://motherbrain.app — used for navigate/highlight links)
#
# ── License Key Resolution (Encore Subscriptions API) ──
# Optional. When set, in-app support messages with a license_key in
# metadata are resolved to a visitor_id via the Encore API lookup endpoint.
# This links in-app support chats with the visitor's web chat history.
# When unset, license keys fall back to `license:{key}` as the visitor_id.
# - ENCORE_API_URL  (e.g. https://api.motherbrain.app)
# - ENCORE_API_KEY  (optional auth for the Encore lookup endpoint)
#
# ── JWT Session Token Verification (Dual-Path Auth) ──
# Optional but required for JWT verification. When set, JWT session tokens
# sent by the website chat widget (Authorization: Bearer header) are verified
# using HMAC-SHA256. Shared secret from the Encore backend auth system.
# Fail-closed: if a JWT is sent but this is unset, the Worker returns 503.
# - JWT_SECRET  (64-char base64url string)
